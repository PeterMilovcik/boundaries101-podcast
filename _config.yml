title: Boundaries 101 for Men
description: >-
  Practical coaching for men who want to build and protect their self-respect.
  Learn to set healthy boundaries in relationships, work, and life.
url: "https://petermilovcik.github.io"
baseurl: "/boundaries101-podcast"
theme: minima

author: Boundaries 101 for Men

minima:
  skin: dark
  social_links:
    - platform: youtube
      user_url: "https://youtube.com/@Boundaries101forMen"
    - platform: spotify
      user_url: "https://open.spotify.com/show/2uoKNnuSgaH1G9shiOMIu8"
    - platform: rss
      user_url: "https://petermilovcik.github.io/boundaries101-podcast/feed.xml"

show_excerpts: true
excerpt_separator: "<!--more-->"

header_pages:
  - about.md
  - episodes.md

defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"

plugins:
  - jekyll-feed
  - jekyll-seo-tag

exclude:
  - audio
  - feed.xml
  - cover.jpg
  - Gemfile
  - Gemfile.lock